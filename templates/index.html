<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etsy Product Shortlister</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/" class="active">Search</a>
        <a href="/shortlisted">Shortlisted</a>
    </nav>

    <div class="container">
        <h1>Etsy Product Shortlister</h1>
        <p class="subtitle">Find trending Etsy products bought in the past 24 hours</p>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="Enter a search keyword (e.g. handmade candles)" />
            <button id="searchBtn" onclick="startSearch()">Search</button>
        </div>

        <div id="progressPanel" class="progress-panel hidden">
            <h3 id="progressTitle">Searching...</h3>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-stats">
                <span id="pageInfo">Page 0/20</span>
                <span id="checked">Checked: 0</span>
                <span id="found">Found: 0</span>
            </div>
            <button class="cancel-btn" id="cancelBtn" onclick="cancelSearch()">Cancel</button>
            <div class="log-container">
                <h4>Log</h4>
                <div id="log"></div>
            </div>
        </div>
    </div>

    <script>
        const keywordInput = document.getElementById('keyword');
        const searchBtn = document.getElementById('searchBtn');
        const progressPanel = document.getElementById('progressPanel');
        const progressBar = document.getElementById('progressBar');
        const pageInfo = document.getElementById('pageInfo');
        const checkedEl = document.getElementById('checked');
        const foundEl = document.getElementById('found');
        const progressTitle = document.getElementById('progressTitle');
        const cancelBtn = document.getElementById('cancelBtn');
        const logDiv = document.getElementById('log');

        let currentSearchId = null;
        let eventSource = null;

        keywordInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') startSearch();
        });

        function startSearch() {
            const keyword = keywordInput.value.trim();
            if (!keyword) return;

            searchBtn.disabled = true;
            progressPanel.classList.remove('hidden');
            progressTitle.textContent = 'Searching...';
            progressBar.style.width = '0%';
            logDiv.innerHTML = '';
            cancelBtn.style.display = 'inline-block';

            if (eventSource) eventSource.close();

            eventSource = new EventSource(`/api/search?keyword=${encodeURIComponent(keyword)}`);

            eventSource.onmessage = function(e) {
                const data = JSON.parse(e.data);

                if (data.type === 'init') {
                    currentSearchId = data.search_id;
                }
                else if (data.type === 'status') {
                    const pct = data.totalPages > 0 ? (data.page / data.totalPages) * 100 : 0;
                    progressBar.style.width = pct + '%';
                    pageInfo.textContent = `Page ${data.page}/${data.totalPages}`;
                    checkedEl.textContent = `Checked: ${data.checked}`;
                    foundEl.textContent = `Found: ${data.found}`;
                }
                else if (data.type === 'log') {
                    addLog(data.message, false);
                }
                else if (data.type === 'match') {
                    addLog(data.message, true);
                }
                else if (data.type === 'done') {
                    progressBar.style.width = '100%';
                    progressTitle.textContent = data.cancelled
                        ? 'Search cancelled'
                        : `Done! Found ${data.found} trending product${data.found !== 1 ? 's' : ''}.`;
                    searchBtn.disabled = false;
                    cancelBtn.style.display = 'none';
                    eventSource.close();
                    eventSource = null;

                    if (data.found > 0) {
                        addLog(`View results on the Shortlisted page.`, false);
                    }
                }
            };

            eventSource.onerror = function() {
                progressTitle.textContent = 'Connection lost. Search may still be running.';
                searchBtn.disabled = false;
                cancelBtn.style.display = 'none';
                eventSource.close();
                eventSource = null;
            };
        }

        function cancelSearch() {
            if (currentSearchId) {
                fetch(`/api/search/${currentSearchId}/cancel`, { method: 'POST' });
            }
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            progressTitle.textContent = 'Cancelling...';
            cancelBtn.style.display = 'none';
            searchBtn.disabled = false;
        }

        function addLog(message, isMatch) {
            const div = document.createElement('div');
            if (isMatch) div.className = 'log-match';
            div.textContent = message;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    </script>
</body>
</html>
