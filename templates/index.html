<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etsy Product Shortlister</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/" class="active">Search</a>
        <a href="/shortlisted">Shortlisted</a>
    </nav>

    <div class="container">
        <h1>Etsy Product Shortlister</h1>
        <p class="subtitle">Find trending Etsy products bought in the past 24 hours</p>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="Enter a search keyword (e.g. handmade candles)" />
            <button id="searchBtn" onclick="startSearch()">Search</button>
        </div>

        <div id="progressPanel" class="progress-panel hidden">
            <h3 id="progressTitle">Searching...</h3>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-stats">
                <span id="pageInfo">Page 0/20</span>
                <span id="checked">Checked: 0</span>
                <span id="found">Found: 0</span>
            </div>
            <button class="cancel-btn" id="cancelBtn" onclick="cancelSearch()">Cancel</button>
            <div class="log-container">
                <h4>Log</h4>
                <div id="log"></div>
            </div>
        </div>
    </div>

    <script>
        const keywordInput = document.getElementById('keyword');
        const searchBtn = document.getElementById('searchBtn');
        const progressPanel = document.getElementById('progressPanel');
        const progressBar = document.getElementById('progressBar');
        const pageInfo = document.getElementById('pageInfo');
        const checkedEl = document.getElementById('checked');
        const foundEl = document.getElementById('found');
        const progressTitle = document.getElementById('progressTitle');
        const cancelBtn = document.getElementById('cancelBtn');
        const logDiv = document.getElementById('log');

        let currentSearchId = null;
        let pollInterval = null;
        let extensionReady = false;

        keywordInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') startSearch();
        });

        // Listen for extension content script
        window.addEventListener('message', (event) => {
            if (event.source !== window) return;
            if (event.data?.type === 'ETSY_EXTENSION_READY') {
                extensionReady = true;
            }
            if (event.data?.type === 'ETSY_PROGRESS') {
                renderExtensionState(event.data.state);
            }
            if (event.data?.type === 'ETSY_STATE' && event.data.state) {
                renderExtensionState(event.data.state);
            }
        });

        async function startSearch() {
            const keyword = keywordInput.value.trim();
            if (!keyword) return;

            searchBtn.disabled = true;
            progressPanel.classList.remove('hidden');
            progressTitle.textContent = 'Searching...';
            progressBar.style.width = '0%';
            logDiv.innerHTML = '';
            cancelBtn.style.display = 'inline-block';

            if (extensionReady) {
                // Use extension (searches via user's browser session)
                addLog('Using Chrome extension to search...', false);
                window.postMessage({
                    type: 'ETSY_START_SEARCH',
                    keyword: keyword,
                    backendUrl: window.location.origin,
                }, '*');
            } else {
                // Use server-side queue (Playwright)
                try {
                    const resp = await fetch('/api/queue', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ keyword }),
                    });
                    const data = await resp.json();
                    currentSearchId = data.search_id;
                    addLog('Search started on server...', false);
                    pollInterval = setInterval(pollProgress, 1000);
                } catch (e) {
                    progressTitle.textContent = 'Error starting search.';
                    searchBtn.disabled = false;
                    addLog('Error: ' + e.message, false);
                }
            }
        }

        async function pollProgress() {
            if (!currentSearchId) return;
            try {
                const resp = await fetch('/api/queue/' + currentSearchId + '/progress');
                const data = await resp.json();
                const p = data.progress || {};

                const pct = p.totalPages > 0 ? (p.currentPage / p.totalPages) * 100 : 0;
                progressBar.style.width = pct + '%';
                pageInfo.textContent = 'Page ' + (p.currentPage || 0) + '/' + (p.totalPages || 5);
                checkedEl.textContent = 'Checked: ' + (p.listingsChecked || 0);
                foundEl.textContent = 'Found: ' + (p.productsFound || 0);

                if (p.log && p.log.length > 0) {
                    logDiv.innerHTML = p.log.map(function(l) {
                        return '<div class="' + (l.startsWith('MATCH') ? 'log-match' : '') + '">' + escapeHtml(l) + '</div>';
                    }).join('');
                    logDiv.scrollTop = logDiv.scrollHeight;
                }

                if (data.status === 'running') {
                    progressTitle.textContent = 'Searching...';
                } else if (data.status === 'completed') {
                    progressBar.style.width = '100%';
                    progressTitle.textContent = 'Done! Found ' + (p.productsFound || 0) + ' trending product(s).';
                    searchBtn.disabled = false;
                    cancelBtn.style.display = 'none';
                    clearInterval(pollInterval);
                    if ((p.productsFound || 0) > 0) addLog('View results on the Shortlisted page.', false);
                } else if (data.status === 'cancelled' || data.status === 'error') {
                    progressTitle.textContent = data.status === 'cancelled' ? 'Search cancelled.' : 'Search failed.';
                    searchBtn.disabled = false;
                    cancelBtn.style.display = 'none';
                    clearInterval(pollInterval);
                }
            } catch (e) {}
        }

        function renderExtensionState(s) {
            if (!s) return;
            progressPanel.classList.remove('hidden');
            const pct = s.totalPages > 0 ? (s.currentPage / s.totalPages) * 100 : 0;
            progressBar.style.width = pct + '%';
            pageInfo.textContent = 'Page ' + s.currentPage + '/' + s.totalPages;
            checkedEl.textContent = 'Checked: ' + s.listingsChecked;
            foundEl.textContent = 'Found: ' + s.productsFound;

            if (s.status === 'running') {
                progressTitle.textContent = 'Searching...';
                searchBtn.disabled = true;
                cancelBtn.style.display = 'inline-block';
            } else {
                progressTitle.textContent = s.status === 'completed'
                    ? 'Done! Found ' + s.productsFound + ' trending product(s).'
                    : s.status;
                searchBtn.disabled = false;
                cancelBtn.style.display = 'none';
            }

            logDiv.innerHTML = (s.log || []).map(function(l) {
                return '<div class="' + (l.startsWith('MATCH') ? 'log-match' : '') + '">' + escapeHtml(l) + '</div>';
            }).join('');
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function cancelSearch() {
            if (extensionReady) {
                window.postMessage({ type: 'ETSY_CANCEL_SEARCH' }, '*');
            } else if (currentSearchId) {
                fetch('/api/queue/' + currentSearchId + '/cancel', { method: 'POST' });
            }
            progressTitle.textContent = 'Cancelling...';
            cancelBtn.style.display = 'none';
            searchBtn.disabled = false;
        }

        function addLog(message, isMatch) {
            const div = document.createElement('div');
            if (isMatch) div.className = 'log-match';
            div.textContent = message;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
